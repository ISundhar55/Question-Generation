version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: question_app_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: question_app
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  python-llm:
    build: ./python-llm
    container_name: question_app_llm
    ports:
      - '8000:8000'
    volumes:
      - ./python-llm/data:/app/data
    env_file:
      - ./python-llm/.env
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
